<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Recipe App</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' href='style.css'>

</head>

<body>
    <header>
        <nav>
            <h2>recipe app</h2>
            <form>
                <input type="text" placeholder="search a recipe" id="searchbox">
                <button type="submit" id="searchbtn">Search</button>
            </form>
        </nav>
    </header>
    <main>
        <section>
            <h2 id="title">Search your favuavite recipe</h2>
        </section>
        <section id="recipr-container">
        </section>
        <div class="recipe-deatils">
            <button type="button" aria-label="Close" id="closeBtn">
             <span aria-hidden="true">&times;</span>
           </button>
           <div class="recipe-item"></div>
        </div>
    </main>
</body>
<script src="script.js"></script>

</html>
